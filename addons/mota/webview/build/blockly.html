<script>
var reopenToolbox = function(index) {
    var w=EventActionFunctions.workspace()
    if (index < 0) index += w.toolbox_.tree_.children_.length;
    w.toolbox_.tree_.setSelectedItem(w.toolbox_.tree_.children_[index]);
    w.getFlyout().show(w.toolbox_.tree_.children_[index].blocks);
}
var searchInput = document.getElementById("searchBlock");
searchInput.onfocus = function () {
    reopenToolbox(-2);
}
searchInput.oninput = function () {
    reopenToolbox(-2);
}
window.searchBlock = function(value) {
    if (value == null) value = searchInput.value;
    value = value.toLowerCase();
    var GDEventStorage=localStorage.getItem('GDEventStorage')
    if (GDEventStorage==null || GDEventStorage=='[]'){
        GDEventStorage=[{"type":"comment","text":"当前未push任何事件进队列"}];
    } else {
        GDEventStorage=JSON.parse(GDEventStorage);
        GDEventStorage=GDEventStorage.map(v=>(v?.actions?.length==1)?v.actions[0]:v)
        GDEventStorage.reverse()
        GDEventStorage.unshift({"type":"comment","text":"目前队列如下,通过push pop变更"})
    }
    if (value == '') return GDEventStorage;
    var results = [];
    for (var name in EventActionBlocks) {
        if (typeof name !== 'string' || !EventActionBlocks[name].json) continue;
        var block = EventActionBlocks[name];
        if(block && block.json) {
            if ((block.json.type||"").toLowerCase().indexOf(value)>=0
                || (block.json.message0||"").toLowerCase().indexOf(value)>=0
                || (block.json.tooltip||"").toLowerCase().indexOf(value)>=0) {
                results.push(name);
                if (results.length>=35)
                    break;
            }
        }
    }

    return results.length == 0 ? [{"type":"comment","text":"没有匹配的事件"}] : results;
}


pushStorage=function () {
    var obj=JSON.parse( blocklyinput.value.replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c])).replace(/\\(r|f|i|c|d|e)/g,'\\\\$1') )
    var GDEventStorage=localStorage.getItem('GDEventStorage')
    if (GDEventStorage==null)GDEventStorage='[]';
    GDEventStorage=JSON.parse(GDEventStorage);
    GDEventStorage.push(obj);
    localStorage.setItem('GDEventStorage',JSON.stringify(GDEventStorage))
}
popStorage=function () {
    var GDEventStorage=localStorage.getItem('GDEventStorage')
    if (GDEventStorage==null)return;
    GDEventStorage=JSON.parse(GDEventStorage);
    if (GDEventStorage.length==0)return;
    var obj=GDEventStorage.pop()
    localStorage.setItem('GDEventStorage',JSON.stringify(GDEventStorage))

    var xml_text = EventActionFunctions.parser.parse(obj);
    var xml = Blockly.Xml.textToDom('<xml>'+xml_text+'</xml>');
    a=Blockly.Xml.domToWorkspace(xml, EventActionFunctions.workspace());
}

function splitShowText(obj) {
    var ret={
        "type": "showTextDic",
        "text": obj.text
    }
    
    EventActionBlocks.showTextDic.args.filter(v=>v!='text').reverse().forEach(k=>{
        var pa=new RegExp(String.raw`(\[${k}\](.*?)\[\/${k}\]\n?)`)
        var ma=pa.exec(ret.text)
        if(pa.exec(ret.text)){
            ret.text=ret.text.replace(ma[1],'')
            ret[k]=ma[2]
        }
    })
    return ret
}

window.convertShowTextToDic=function(b){

    var obj=eval('['+EventActionBlocks[b.type].generFunc(b)+'][0]')
    
    var xml_text = EventActionFunctions.parser.parse(splitShowText(obj));
    var xml = Blockly.Xml.textToDom('<xml>'+xml_text+'</xml>');
    a=Blockly.Xml.domToWorkspace(xml, EventActionFunctions.workspace());
    c=b.workspace.getBlockById(a[0])

    // var previousTarget = b.previousConnection.targetConnection;
    // b.previousConnection.disconnect()
    // previousTarget.connect(c.previousConnection)
    // c.nextConnection.connect(b.nextConnection.targetConnection)
    b.previousConnection.targetConnection.connect(c.previousConnection)
    b.dispose(true,false)
    // b.dispose(true,true)

}

function mergeShowText(obj) {
    var ret={
        "type": "showText",
        "text": obj.text
    }
    EventActionBlocks.showTextDic.args.filter(v=>v!='text').reverse().forEach(k=>{
        if(obj[k])ret.text=`[${k}]${obj[k]}[/${k}]\n`+ret.text
    })
    return ret
}

Blockly.FieldColour.prototype.showEditor_ = function() {
    this.picker_ = this.dropdownCreate_();
    Blockly.DropDownDiv.getContentDiv().appendChild(this.picker_);
    Blockly.DropDownDiv.showPositionedByField(this, this.dropdownDispose_.bind(this));
    this.picker_.focus({
        preventScroll: !0
    })
    Blockly.DropDownDiv.hideWithoutAnimation();

    var clickEvent = new MouseEvent("click", {
        "view": window,
        "bubbles": true,
        "cancelable": false
    });

    var self=this;
    var a = document.createElement('input');
    a.setAttribute('type','color')
    a.setAttribute('value',self.getValue())
    a.oninput=function(){self.setValue(a.value)}
    setTimeout(() => {
        
        a.dispatchEvent(clickEvent);
    }, 10);


};

// blockly FieldDropdown
// 避免json中不存在的项解析成下拉框会丢失
// ref https://github.com/ckcz123/mota-js/commit/d1dc122
Blockly.FieldDropdown.prototype.doClassValidation_ = function (opt_newValue) { 
    return opt_newValue;
}

Blockly.FieldDropdown.prototype.doValueUpdate_ = function (newValue) {
    Blockly.FieldDropdown.superClass_.doValueUpdate_.call(this, newValue);
    var options = this.getOptions(true);
    for (var i = 0, option; (option = options[i]); i++) {
        if (option[1] == this.value_) {
            this.selectedOption_ = option;
        }
    }
    if (this.selectedOption_[1] != this.value_) {
        options.push([this.value_, this.value_]);
        this.selectedOption_ = options[options.length - 1];
    }
};

        var GDEventStorage=localStorage.getItem('GDEventStorage')
        if (GDEventStorage==null)GDEventStorage='[]';
        GDEventStorage=JSON.parse(GDEventStorage);
        GDEventStorage[0]=obj;
        localStorage.setItem('GDEventStorage',JSON.stringify(GDEventStorage))
        window.close()
    }
    var lengcontent=encodeURIComponent(content)
    console.log(lengcontent.length)
    if (lengcontent.length<60000) {
        fetch('/data',{
            method: "POST", 
            body: JSON.stringify({status:'done',content:lengcontent,cid:connect.cid,cindex:connect.cindex}),
        })
        .then(cb_done)
        return
    }
    var total=Math.ceil(lengcontent.length/60000)-1
    var current={count:-1,total,lengcontent}
    var func=function(current){
        current.count+=1
        console.log('current',current)
        var status='done'
        if (current.count==0) {
            fetch('/data',{
                method: "POST", 
                body: JSON.stringify({status:'start',content:current.lengcontent.slice(0,60000),cid:connect.cid,cindex:connect.cindex}),
            })
            .then(r=>{func(current)})

        if (current.count==current.total) {

        })
        .then(r=>{func(current)})
